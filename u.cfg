// GERAL
name "Elesbão"
setinfo _vgui_menus 1
cl_weather 0

// Mouse e resposta
m_rawinput "1"
m_filter "0"
m_customaccel "0"
sensitivity "0.9"

// Video
gl_vsync "0"

// Mira
cl_crosshair_translucent "0"
cl_crosshair_color "255 255 255"
cl_crosshair_size "small"
cl_dynamiccrosshair "0"
cl_bob "0"

// Rede
cl_updaterate 100
cl_cmdrate 100
ex_interp 0.01
rate 30000

// BINDS

alias r60 "cl_cmdrate 60; cl_updaterate 60; ex_interp 0.0167; fps_max 100; echo Config 60Hz ativada"
alias r100 "cl_cmdrate 100; cl_updaterate 100; ex_interp 0.01; fps_max 100; echo Config 100Hz ativada"

say "/skinarmas"
say "/sounds"

bind "F1" "buy awp; buy deagle; buy vesthelm; buy primammo; buy secammo; buy hegren; buy flash; buy flash; buy sgren; echo Compra completa efetuada"
bind "F2" "say /armas; menuselect 3; menuselect 0; slot3"
bind "MOUSE5" "say /armas; menuselect 3; menuselect 0; slot3"

echo "u.cgf carregado!"